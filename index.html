<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒館角色卡轉換器</title>
    <script src="https://unpkg.com/opencc-js@1.0.5/dist/umd/opencc-js.min.js"></script>
    <style>
        :root {
            --primary: #bb86fc;
            --secondary: #03dac6;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--surface);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 550px;
            border: 1px solid #333;
            position: relative;
        }
        
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: #ccc;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            outline: none;
        }

        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; margin-top: 10px; margin-bottom: 1.5rem; }
        
        .setup-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.95rem; color: #aaa; font-weight: bold; }
        
        select.mode-select {
            width: 100%;
            padding: 12px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 15px;
        }

        .info-box {
            background: #252525;
            border-left: 4px solid var(--secondary);
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #ddd;
            line-height: 1.6;
        }

        .drop-zone {
            border: 2px dashed #555;
            padding: 40px 20px;
            text-align: center;
            border-radius: 12px;
            background: #1a1a1a;
            transition: 0.3s;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .drop-zone.dragover { border-color: var(--primary); background: #2d2635; }
        .drop-zone p { margin: 0; font-size: 1.1rem; font-weight: bold; color: #ccc; }
        .drop-zone span { font-size: 0.85rem; color: #777; display: block; margin-top: 10px; }

        #log {
            margin-top: 1.5rem;
            background: #000;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 180px;
            overflow-y: auto;
            color: #00ffcc;
            border: 1px solid #222;
        }
        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: #666; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <select id="uiLang" class="lang-switch" onchange="changeUI()">
        <option value="zh-TW">繁體介面</option>
        <option value="zh-CN">简体界面</option>
    </select>

    <h1 id="ui-title">酒館角色卡 PNG ➔ PNG 轉換器</h1>
    
    <div class="setup-group">
        <label id="ui-modeLabel">轉換模式</label>
        <select id="mode" class="mode-select">
            <option value="t2s" id="opt_t2s">繁體轉簡體（標準轉換）</option>
            <option value="s2t" id="opt_s2t">簡體轉繁體（標準轉換）</option>
            <option value="tw2sp" id="opt_tw2sp">繁體轉簡體（詞彙轉換）</option>
            <option value="s2twp" id="opt_s2twp">簡體轉繁體（詞彙轉換）</option>
        </select>
    </div>

    <div class="info-box">
        <strong id="ui-descTitle" style="color: var(--secondary);">💡 轉換說明</strong><br>
        <span id="ui-descStd">標準轉換：视频 = 視頻</span><br>
        <span id="ui-descVoc">詞彙轉換：视频 = 影片</span>
    </div>

    <div class="drop-zone" id="dropZone">
        <p id="ui-dropHint">點擊或拖放角色卡 PNG 到這裡</p>
        <span id="ui-dropSub">支援多檔案處理。轉換後將自動下載新的 PNG 圖片。</span>
        <input type="file" id="fileInput" multiple accept=".png,.json" style="display:none">
    </div>

    <div id="log"></div>

    <div class="footer" id="ui-footerText">
        本工具使用 OpenCC-js 進行翻譯，並手動重組 PNG 二進位數據塊。<br>
        它會精確修改 <code>chara</code> 數據並重新計算 CRC 校驗碼，確保圖片不損毀。
    </div>
</div>

<script>
    const logArea = document.getElementById('log');
    function log(msg) {
        const time = new Date().toLocaleTimeString([], { hour12: false });
        const line = document.createElement('div');
        line.textContent = `[${time}] ${msg}`;
        logArea.appendChild(line);
        logArea.scrollTop = logArea.scrollHeight;
    }

    // --- 儲存與讀取設定 (LocalStorage) ---
    const STORAGE_LANG_KEY = 'tavern_converter_lang';
    const STORAGE_MODE_KEY = 'tavern_converter_mode';

    window.addEventListener('DOMContentLoaded', () => {
        // 檢查 OpenCC 是否成功載入
        setTimeout(() => {
            if (typeof OpenCC !== 'undefined') {
                log("✅ 翻譯核心(OpenCC)載入成功！準備就緒。");
            } else {
                log("❌ 錯誤：翻譯核心載入失敗。請檢查網路，或您的瀏覽器可能阻擋了外部腳本。");
            }
        }, 500);

        const savedLang = localStorage.getItem(STORAGE_LANG_KEY);
        if (savedLang) document.getElementById('uiLang').value = savedLang;
        changeUI(); 

        const savedMode = localStorage.getItem(STORAGE_MODE_KEY);
        if (savedMode) document.getElementById('mode').value = savedMode;
    });

    document.getElementById('mode').addEventListener('change', function() {
        localStorage.setItem(STORAGE_MODE_KEY, this.value);
    });

    // --- UI 多語言字典 ---
    const i18n = {
        "zh-TW": {
            title: "酒館角色卡 PNG ➔ PNG 轉換器",
            modeLabel: "轉換模式",
            opt_t2s: "繁體轉簡體（標準轉換）",
            opt_s2t: "簡體轉繁體（標準轉換）",
            opt_tw2sp: "繁體轉簡體（詞彙轉換）",
            opt_s2twp: "簡體轉繁體（詞彙轉換）",
            descTitle: "💡 轉換說明",
            descStd: "標準轉換：视频 = 視頻",
            descVoc: "詞彙轉換：视频 = 影片",
            dropHint: "點擊或拖放角色卡 PNG / JSON 到這裡",
            dropSub: "支援多檔案處理。轉換後將自動下載新的檔案。",
            footerText: "本工具使用 OpenCC-js 進行翻譯，並手動重組 PNG 二進位數據塊。<br>它會精確修改 <code>chara</code> 數據並重新計算 CRC 校驗碼，確保圖片不損毀。"
        },
        "zh-CN": {
            title: "酒馆角色卡 PNG ➔ PNG 转换器",
            modeLabel: "转换模式",
            opt_t2s: "繁体转简体（标准转换）",
            opt_s2t: "简体转繁体（标准转换）",
            opt_tw2sp: "繁体转简体（词汇转换）",
            opt_s2twp: "简体转繁体（词汇转换）",
            descTitle: "💡 转换说明",
            descStd: "标准转换：视频 = 視頻",
            descVoc: "词汇转换：视频 = 影片",
            dropHint: "点击或拖放角色卡 PNG / JSON 到这里",
            dropSub: "支持多文件处理。转换后将自动下载新的文件。",
            footerText: "本工具使用 OpenCC-js 进行翻译，并手动重组 PNG 二进制数据块。<br>它会精确修改 <code>chara</code> 数据并重新计算 CRC 校验码，确保图片不损毁。"
        }
    };

    function changeUI() {
        const lang = document.getElementById('uiLang').value;
        localStorage.setItem(STORAGE_LANG_KEY, lang);
        const dict = i18n[lang];
        document.getElementById('ui-title').innerText = dict.title;
        document.getElementById('ui-modeLabel').innerText = dict.modeLabel;
        document.getElementById('opt_t2s').innerText = dict.opt_t2s;
        document.getElementById('opt_s2t').innerText = dict.opt_s2t;
        document.getElementById('opt_tw2sp').innerText = dict.opt_tw2sp;
        document.getElementById('opt_s2twp').innerText = dict.opt_s2twp;
        document.getElementById('ui-descTitle').innerText = dict.descTitle;
        document.getElementById('ui-descStd').innerText = dict.descStd;
        document.getElementById('ui-descVoc').innerText = dict.descVoc;
        document.getElementById('ui-dropHint').innerText = dict.dropHint;
        document.getElementById('ui-dropSub').innerText = dict.dropSub;
        document.getElementById('ui-footerText').innerHTML = dict.footerText;
    }

    // --- CRC32 與核心處理邏輯 ---
    const crcTable = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
        let c = i;
        for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        crcTable[i] = c;
    }

    function calculateCrc(data) {
        let crc = 0xFFFFFFFF;
        for (let i = 0; i < data.length; i++) crc = (crc >>> 8) ^ crcTable[(crc ^ data[i]) & 0xFF];
        return (crc ^ 0xFFFFFFFF) >>> 0;
    }

    // 拖放與選擇事件
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); };
    fileInput.onchange = (e) => handleFiles(e.target.files);

    function getConverter(mode) {
        let opencc;
        let manualReplace = {}; 

        if (mode === 't2s') {
            opencc = OpenCC.Converter({ from: 'tw', to: 'cn' });
        } else if (mode === 's2t') {
            opencc = OpenCC.Converter({ from: 'cn', to: 'tw' });
        } else if (mode === 's2twp') {
            opencc = OpenCC.Converter({ from: 'cn', to: 'twp' });
        } else if (mode === 'tw2sp') {
            opencc = OpenCC.Converter({ from: 'tw', to: 'cn' });
            manualReplace = { "影片": "视频", "程式": "程序", "訊息": "信息", "網路": "网络", "螢幕": "屏幕", "硬碟": "硬盘", "記憶體": "内存", "軟體": "软件" };
        }

        return (text) => {
            let res = opencc(text);
            if (mode === 'tw2sp') {
                for (let k in manualReplace) res = res.split(k).join(manualReplace[k]);
            }
            return res;
        };
    }

    function deepTranslate(obj, converter) {
        if (typeof obj === 'string') return converter(obj);
        if (Array.isArray(obj)) return obj.map(v => deepTranslate(v, converter));
        if (obj !== null && typeof obj === 'object') {
            const newObj = {};
            for (let key in obj) newObj[key] = deepTranslate(obj[key], converter);
            return newObj;
        }
        return obj;
    }

    async function handleFiles(files) {
        if (files.length === 0) return;
        
        try {
            if (typeof OpenCC === 'undefined') {
                throw new Error("翻譯核心未載入！請檢查網路連線。");
            }
            
            const mode = document.getElementById('mode').value;
            const converter = getConverter(mode);

            for (const file of files) {
                try {
                    log(`⏳ 處理中: ${file.name}...`);
                    if (file.name.toLowerCase().endsWith('.png')) {
                        const newPngBuffer = await processPngToPng(file, converter);
                        downloadBlob(newPngBuffer, converter(file.name), 'image/png');
                        log(`✅ ${file.name} 轉換完成並下載`);
                    } else if (file.name.toLowerCase().endsWith('.json')) {
                        const json = JSON.parse(await file.text());
                        const translated = deepTranslate(json, converter);
                        downloadBlob(JSON.stringify(translated, null, 2), converter(file.name), 'application/json');
                        log(`✅ ${file.name} 轉換完成並下載`);
                    } else {
                        log(`⚠️ 忽略不支援的檔案格式: ${file.name}`);
                    }
                } catch (err) {
                    log(`❌ 檔案 [${file.name}] 處理失敗: ${err.message}`);
                    console.error(err);
                }
            }
        } catch (mainErr) {
            log(`🚨 系統錯誤: ${mainErr.message}`);
        }
    }

    async function processPngToPng(file, converter) {
        const buffer = await file.arrayBuffer();
        const view = new DataView(buffer);
        const bytes = new Uint8Array(buffer);

        if (view.getUint32(0) !== 0x89504E47) throw new Error("無效的 PNG 檔案 (Header 錯誤)");

        let pos = 8;
        const chunks = [];
        let charaChunkIndex = -1;
        let charaData = null;

        while (pos < bytes.length) {
            const length = view.getUint32(pos);
            const typeBuffer = bytes.slice(pos + 4, pos + 8);
            const type = String.fromCharCode(...typeBuffer);
            const data = bytes.slice(pos + 8, pos + 8 + length);
            const crc = view.getUint32(pos + 8 + length);

            chunks.push({ length, type, typeBuffer, data, crc });

            if ((type === 'tEXt' || type === 'iTXt') && charaChunkIndex === -1) {
                const content = new TextDecoder().decode(data);
                if (content.startsWith('chara')) {
                    const base64Part = content.includes('\0') ? content.split('\0')[1] : content.substring(5);
                    charaData = JSON.parse(atob(base64Part));
                    charaChunkIndex = chunks.length - 1;
                }
            }
            pos += length + 12;
        }

        if (charaChunkIndex === -1 || !charaData) throw new Error("找不到酒館角色資料塊 (可能不是標準卡片)");

        const translatedChara = deepTranslate(charaData, converter);
        const newJsonString = JSON.stringify(translatedChara);
        // 使用 encodeURIComponent 避免中文轉 base64 出錯
        const newBase64Data = btoa(unescape(encodeURIComponent(newJsonString)));
        
        const key = "chara";
        const newTextContent = new Uint8Array(key.length + 1 + newBase64Data.length);
        for(let i=0; i<key.length; i++) newTextContent[i] = key.charCodeAt(i);
        newTextContent[key.length] = 0;
        for(let i=0; i<newBase64Data.length; i++) newTextContent[key.length + 1 + i] = newBase64Data.charCodeAt(i);

        const typeBuffer = chunks[charaChunkIndex].typeBuffer;
        const crcInput = new Uint8Array(typeBuffer.length + newTextContent.length);
        crcInput.set(typeBuffer);
        crcInput.set(newTextContent, typeBuffer.length);
        const newCrc = calculateCrc(crcInput);

        chunks[charaChunkIndex].length = newTextContent.length;
        chunks[charaChunkIndex].data = newTextContent;
        chunks[charaChunkIndex].crc = newCrc;

        let totalLength = 8;
        for (const chunk of chunks) totalLength += chunk.length + 12;

        const newPngBytes = new Uint8Array(totalLength);
        newPngBytes.set([0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A]);
        
        let writePos = 8;
        const writeView = new DataView(newPngBytes.buffer);
        
        for (const chunk of chunks) {
            writeView.setUint32(writePos, chunk.length);
            newPngBytes.set(chunk.typeBuffer, writePos + 4);
            newPngBytes.set(chunk.data, writePos + 8);
            writeView.setUint32(writePos + 8 + chunk.length, chunk.crc);
            writePos += chunk.length + 12;
        }

        return newPngBytes;
    }

    function downloadBlob(content, filename, contentType) {
        const a = document.createElement("a");
        const file = new Blob([content], { type: contentType });
        a.href = URL.createObjectURL(file);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }
</script>

</body>
</html>
